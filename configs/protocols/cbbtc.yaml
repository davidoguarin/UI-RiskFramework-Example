# cbBTC (treated as an asset in simulation jump model)
category: asset
# Monthly volatility (e.g. asset risk); jump_probability for assets uses base rate × 1, not this field.
monthly_volatility: 0.04
Delta_Critical: 0  # No cbBTC depeg <0.9 or qualifying freeze/governance attack in last month
validator_services: null  # cbBTC is an asset wrapper; no validator operations
counterparty_protocols: null  # Asset; S_CDiv not applicable

n_dvn: null  # Number of required LayerZero DVNs; null = no cross-chain DVN messaging

bad_debt_ratio: null       # bad_debt_usd / total_loans_usd; null = non-lending protocol
bad_debt_prevention: null  # {max_ltv: <float>, has_safety_module: <bool>}; null = non-lending
