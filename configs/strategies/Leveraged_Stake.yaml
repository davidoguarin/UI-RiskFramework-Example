portfolio:
  # Total portfolio size (same unit as each protocol TVL)
  p_tot: 20000000

strategy:
  # Tail-risk liquidation sim (run_liquidation.py): set enabled true and params_file when needed.
  liquidation:
    enabled: true
    params_file: params_liquidation_eth_lending_b.yaml
  simulation:
    volatility_annual: 0.45
    apy_min: 0.08
    apy_max: 0.11
    strategy_name: Supply One Protocol
  # Protocols included in this strategy scenario.
  protocols:
    # Protocol display name (must match the intended protocol config file mapping)
    - name: Aave
      # Maximum allocation cap as % of total portfolio
      alloc_max_pct: 70
    - name: Lido
      alloc_max_pct: 70
