portfolio:
  # Total portfolio size (same unit as each protocol TVL)
  p_tot: 20000000

strategy:
  liquidation:
    enabled: false
  simulation:
    volatility_annual: 0.01
    apy_min: 0.025
    apy_max: 0.055
    strategy_name: Supply One Protocol
  # Protocols included in this strategy scenario.
  protocols:
    # Protocol display name (must match the intended protocol config file mapping)
    - name: Aave
      # Maximum allocation cap as % of total portfolio
      alloc_max_pct: 50
    - name: Maple
      alloc_max_pct: 50
    - name: compound
      alloc_max_pct: 50

